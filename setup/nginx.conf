# =============================================================
# ESKRISTAL — Konfigurasi Nginx
# Salin ke server: sudo cp setup/nginx.conf /etc/nginx/sites-available/eskristal
#                  sudo ln -s /etc/nginx/sites-available/eskristal /etc/nginx/sites-enabled/
#                  sudo nginx -t && sudo nginx -s reload
# =============================================================

# Zone rate limiting — didefinisikan di level http{} (taruh di nginx.conf global
# atau pastikan snippet ini dimasukkan di dalam blok http{})
limit_req_zone $binary_remote_addr zone=webhook:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login:10m   rate=5r/m;

# ── HTTP → redirect HTTPS ─────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name eskristal.ajengmedia.com;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name eskristal.ajengmedia.com;

    root  /var/www/eskristal;
    index index.php;

    # TLS — dikelola Certbot (jalankan: sudo certbot --nginx -d eskristal.ajengmedia.com)
    ssl_certificate     /etc/letsencrypt/live/eskristal.ajengmedia.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eskristal.ajengmedia.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ─────────────────────────────────────
    add_header X-Frame-Options        "DENY"           always;
    add_header X-Content-Type-Options "nosniff"        always;
    add_header Referrer-Policy        "same-origin"    always;
    add_header X-XSS-Protection       "1; mode=block"  always;

    # ── Blokir akses ke folder sensitif ─────────────────────
    location ^~ /config/ {
        deny all;
        return 403;
    }
    location ^~ /includes/ {
        deny all;
        return 403;
    }
    location ^~ /sync/ {
        deny all;
        return 403;
    }
    location ^~ /setup/ {
        deny all;
        return 403;
    }

    # ── Rate limit webhook ───────────────────────────────────
    location = /api/wa-webhook.php {
        limit_req zone=webhook burst=20 nodelay;
        limit_req_status 429;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS on;
    }

    # ── Rate limit login ─────────────────────────────────────
    location = /admin/login.php {
        limit_req zone=login burst=3 nodelay;
        limit_req_status 429;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS on;
    }

    # ── PHP handler umum ─────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass  unix:/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        include       fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS on;
    }

    # ── Aset statis ──────────────────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Sembunyikan dotfiles ─────────────────────────────────
    location ~ /\. {
        deny all;
    }

    # ── Default ──────────────────────────────────────────────
    location / {
        try_files $uri $uri/ =404;
    }

    access_log /var/log/nginx/eskristal-access.log;
    error_log  /var/log/nginx/eskristal-error.log;
}
